version: 2

# Keeps dependencies patched without drowning the repo in one-PR-per-bump noise.
# npm updates are grouped so a week's minor/patch bumps arrive as a couple of
# reviewable PRs; the CI workflow gates each one. Major bumps stay separate so a
# breaking upgrade (Next, React, Clerk, Supabase) gets its own focused review.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Non-breaking bumps, batched.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Framework majors are handled deliberately, not by a bot PR.
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      # eslint 10 breaks eslint-config-next's bundled eslint-plugin-react
      # (removed the legacy context.getFilename API). Stay on eslint 9 until
      # the Next lint stack supports 10.
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      # typescript 7 is the native (Go) compiler and drops the JS compiler API
      # that Next.js build-time type checking and typescript-eslint require
      # (peer range <6.1.0); bumping to it broke the Vercel production build.
      # Stay on 6.0.x until the Next toolchain supports 7.
      - dependency-name: typescript
        update-types: [version-update:semver-major]

  # Keep the Actions in this repo's own workflows current too.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
