name: CI

# Formalizes the checks CLAUDE.md already treats as required before any work is
# "complete": typecheck, lint, and a production build. Runs on every PR into main
# and on direct pushes to main. Keeps the sequential draft-PR flow honest without
# relying on a human to remember the commands.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same branch/PR cancels the older, still-running job.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Project rule: 0 errors required; the ~16 pre-existing warnings are
      # acceptable, so a clean `eslint .` exit (which does not fail on warnings)
      # is the gate.
      - name: Lint
        run: npm run lint

      # Placeholder public env only. These are non-secret and exist purely so
      # Next can resolve the Clerk/Supabase clients during the build; no real
      # keys are needed to typecheck the bundle or catch build-time breaks.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_dummydummydummydummydummydummydummy00
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_APP_URL: https://roleboost.app
