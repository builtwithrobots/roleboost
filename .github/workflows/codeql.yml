name: CodeQL

# Static security analysis for the JS/TS surface. This app handles Clerk JWTs,
# the Supabase service-role key, and Paddle/Anthropic/Resend secrets, so a
# scheduled scan for injection, auth, and data-flow issues is worth the minutes.
# Findings land in the repo's Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly disclosed query-pack rules catch existing code even with
    # no new commits.
    - cron: '0 4 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
